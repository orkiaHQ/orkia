# orkia-reasoning-store — local SQLite store for the reasoning graph.
# Single-owner blocking `rusqlite::Connection` (owned by the reasoning
# consumer thread), so no Arc<Mutex>. Mirrors the cloud Postgres schema
# 1:1 and stores every closed domain as the enum's serde discriminant.
[package]
name = "orkia-reasoning-store"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
thiserror.workspace = true
# 0.32 pins libsqlite3-sys 0.30 so it shares the same `links = "sqlite3"`
# native lib as sqlx-sqlite (0.30.1) when the proprietary binary bundles this shell —
# two libsqlite3-sys versions can't coexist (one-copy-per-links rule).
rusqlite = { version = "0.32", features = ["bundled"] }
orkia-reasoning-core.workspace = true
orkia-rfc-core.workspace = true
