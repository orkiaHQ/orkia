[package]
name = "orkia-test-harness"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "End-to-end test harness for the Orkia shell — drives the real `orkia` binary inside a PTY, owns a hermetic ORKIA_HOME, tails the journal, installs scripted TUI agents. No mocks."

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9"
tempfile = "3"
portable-pty = { workspace = true }
vt100 = "0.15"
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
nix = { version = "0.29", features = ["signal"] }
libc = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
