[package]
name = "orkia-value"
version = "0.1.0"
edition.workspace = true
license = "Elastic-2.0"
description = "Wasm-compatible core of EXEC-CORE: Value, Type, and the §3.2 tagged-JSON boundary bridge (shared by the host and the plugin SDK). SPEC-ORKIA-PLUGIN-RUST-V1."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
indexmap = { workspace = true }
base64 = { workspace = true }
# No `clock` feature: this crate only parses/formats dates (never `now()`), so
# it stays wasm32-wasip1-buildable for the plugin SDK. `alloc` provides
# `to_rfc3339_opts` / `parse_from_rfc3339` without the clock backend.
chrono = { version = "0.4", default-features = false, features = ["serde", "alloc"] }
