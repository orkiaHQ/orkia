# orkia-reasoning-core — pure domain types for the Orkia reasoning graph.
# No I/O. All closed graph domains (roles, links, node kinds, …) are enums,
# not strings, with a single serde representation shared by the HTTP wire and
# the SQLite/Postgres TEXT columns.
