[package]
name = "orkia-shell-types"
version = "0.1.0"
edition.workspace = true
license = "Elastic-2.0"
description = "Shared types for the Orkia shell"

[dependencies]
# Value/Type live in the lean, wasm-buildable `orkia-value` and are re-exported
# here so existing `orkia_shell_types::{Value, Type}` paths are unchanged.
orkia-value = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
toml = { workspace = true }
indexmap = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
orkia-terminal-core = { workspace = true }
orkia-rfc-core = { workspace = true }
orkia-forge-types = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }

[features]
default = []
# Exposes `team::mock::MockTeamClient` to downstream test crates.
test-utils = []

[dev-dependencies]
tempfile = "3"
