name: Bug report
description: Something doesn't work the way it should.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands / config to reproduce the issue.
      render: bash
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Orkia version
      description: Output of `orkia --version`.
      placeholder: orkia 0.1.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, arch, terminal emulator.
      placeholder: macOS 14.5 / aarch64 / Ghostty
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output from `orkia journal` or stderr. Trim PII before pasting.
      render: text
