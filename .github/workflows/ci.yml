name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# PRs from forks must be able to run the basic gate without secrets.
# Do not add secret-bearing jobs to this workflow.

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: cargo clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config
      - run: cargo test --workspace

  # Dedicated Linux lane for the cage shim + launcher. These two crates are
  # dependency-light (only `orkia-shell-types`) and carry the Linux-only
  # enforcement paths (`linux_sb.rs`: user/mount/PID namespaces, sole-shell
  # install) that are `cfg(target_os = "linux")` and never built on the macOS
  # runner. Gating them here keeps the security-critical cage code clippy-clean
  # and tested on Linux even if the full `--workspace` build is held up
  # elsewhere. No GTK/system deps needed — the cage crates pull none.
  cage-linux:
    name: cage (orkia-sh + orkia-cage, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: cage-linux
      - name: Clippy (cage crates)
        run: cargo clippy -p orkia-sh -p orkia-cage --all-targets -- -D warnings
      - name: Test (cage crates — includes cfg(linux) enforcement paths)
        run: cargo test -p orkia-sh -p orkia-cage
      - name: Runtime enforcement (SPEC-ORKIA-CAP — real mount ns + shim)
        # Asserts read=off→ENOENT, write=off→EROFS, exec=off→deny against a real
        # cage. Skips itself cleanly if the runner lacks unprivileged userns.
        run: qa/linux/cap-enforce.sh

  # Hard CI gate that drives a real `orkia` shell in a PTY with the
  # scripted fake-agent. Catches regressions in `dispatch_agent`, the
  # journal disk-tee, `FinalResponseService` auto-wiring, and the
  # live-agent reuse fast path. See `crates/orkia-test-harness/tests/`.
  e2e-real-agent:
    name: E2E with real agent binaries
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-real-agent
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Export kernel trust anchor
        # SEC-003: release builds (--release) fail to compile without the
        # embedded kernel-signing pubkey. Canonical copy: kernel-pubkey.hex
        # at the repo root — a committed public file, not a secret, so this
        # is safe for fork PRs.
        run: |
          echo "ORKIA_KERNEL_PUBKEY_HEX=$(tr -d '[:space:]' < kernel-pubkey.hex)" \
            >> "$GITHUB_ENV"
      - name: Build orkia + orkia-fake-agent
        run: cargo build --release --bin orkia --bin orkia-fake-agent
      - name: Run harness tests
        env:
          ORKIA_TEST_BIN: ${{ github.workspace }}/target/release/orkia
          ORKIA_TEST_FAKE_AGENT_BIN: ${{ github.workspace }}/target/release/orkia-fake-agent
        run: cargo test -p orkia-test-harness -- --nocapture

  build:
    name: cargo build --release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config
      - name: Export kernel trust anchor
        # SEC-003: release builds (--release) fail to compile without the
        # embedded kernel-signing pubkey. Canonical copy: kernel-pubkey.hex
        # at the repo root — a committed public file, not a secret, so this
        # is safe for fork PRs.
        run: |
          echo "ORKIA_KERNEL_PUBKEY_HEX=$(tr -d '[:space:]' < kernel-pubkey.hex)" \
            >> "$GITHUB_ENV"
      - run: cargo build --release --bin orkia
      - name: Smoke (--version)
        run: ./target/release/orkia --version

  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev pkg-config
      - run: cargo build --workspace --locked

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace
